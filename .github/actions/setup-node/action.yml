name: 'Setup Node.js'
description: 'Setup pnpm, Node.js, and install dependencies (requires checkout first)'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'

runs:
  using: 'composite'
  steps:
    # No version pin here — pnpm version comes from the "packageManager"
    # field in package.json (single source of truth).
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
